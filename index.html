<body>

<div class="app">

<div class="card">

<h1>Present Continuous</h1>

<div class="instructions">
Choose the correct Present Continuous form.
</div>

<div class="score-box">
Score:
<span id="score">0</span>
</div>

<div class="emoji" id="emoji">😊</div>

<div class="sentence" id="sentence"></div>

<div class="question">
Choose the correct answer:
</div>

<div id="buttons"></div>

<div id="resultBox"
     class="result"
     style="display:none;">
</div>

<button id="nextButton"
        class="next-btn"
        style="display:none;"
        onclick="nextSentence()">

Next sentence

</button>

</div>

</div>

<script>

const sentences = [

["Tom","is playing","football now"],
["Anna","is reading","a book"],
["The children","are swimming","in the pool"],
["My dad","is cooking","dinner"],
["We","are watching","TV"],
["I","am doing","my homework"],
["The dog","is sleeping","in the garden"],
["They","are running","in the park"],
["She","is drinking","water"],
["You","are listening","to music"],

["My friends","are dancing","at the party"],
["The teacher","is writing","on the board"],
["He","is eating","a sandwich"],
["The baby","is crying","now"],
["We","are studying","English"],
["The girls","are singing","a song"],
["My mother","is cleaning","the kitchen"],
["The boys","are jumping","in the garden"],
["I","am drawing","a picture"],
["Tom and Ben","are walking","to school"],

["The cat","is climbing","the tree"],
["Grandma","is making","a cake"],
["The students","are learning","new words"],
["My brother","is playing","computer games"],
["Dad","is washing","the car"],
["The birds","are flying","in the sky"],
["She","is talking","on the phone"],
["We","are eating","pizza"],
["The teacher","is helping","the students"],
["I","am writing","an email"],

["The boys","are riding","their bikes"],
["Anna","is wearing","a red dress"],
["My parents","are shopping","in town"],
["The baby","is sleeping","in the bed"],
["The children","are laughing","loudly"],
["Tom","is opening","the window"],
["We","are sitting","in the classroom"],
["The dog","is eating","its food"],
["She","is brushing","her hair"],
["The girls","are taking","photos"],

["My father","is reading","the newspaper"],
["The students","are answering","the questions"],
["I","am carrying","my bag"],
["The monkey","is eating","a banana"],
["They","are playing","basketball"],
["The teacher","is speaking","English"],
["My sister","is listening","to the radio"],
["The ducks","are swimming","in the lake"],
["We","are waiting","for the bus"],
["The boy","is kicking","the ball"]

];

let score = 0;

const emojis = [
"😊","😎","🎉","⭐","👏","🥳","💪"
];

let current = [];

function randomItem(array){
    return array[Math.floor(Math.random()*array.length)];
}

function shuffle(array){

    for(let i=array.length-1; i>0; i--){

        const j=Math.floor(Math.random()*(i+1));

        [array[i],array[j]]=[array[j],array[i]];
    }

    return array;
}

function generateSentence(){

    current = randomItem(sentences);

    const subject = current[0];
    const correct = current[1];
    const ending = current[2];

    const verbOnly =
        correct.split(" ")[1];

    const wrong1 =
        correct.split(" ")[0] + " " +
        verbOnly.replace("ing","");

    const wrong2 =
        verbOnly;

    document.getElementById("sentence").innerText =
        `${subject} ___ ${ending}.`;

    const answers = shuffle([
        correct,
        wrong1,
        wrong2
    ]);

    let html = "";

    answers.forEach(answer=>{

        html += `
        <button onclick="checkAnswer('${answer}','${correct}')">
        ${answer}
        </button>
        `;
    });

    document.getElementById("buttons").innerHTML =
        html;

    document.getElementById("resultBox").style.display =
        "none";

    document.getElementById("nextButton").style.display =
        "none";
}

function checkAnswer(answer,correct){

    const resultBox =
        document.getElementById("resultBox");

    resultBox.style.display = "block";

    if(answer===correct){

        score++;

        document.getElementById("score").innerText =
            score;

        document.getElementById("emoji").innerText =
            randomItem(emojis);

        resultBox.innerHTML = `

        <div class="correct">
        Great! 🎉
        </div>

        <div class="solution">
        ${current[0]} ${correct} ${current[2]}.
        </div>

        <div class="explanation">
        Correct Present Continuous sentence.
        </div>

        `;

    } else {

        document.getElementById("emoji").innerText =
            "😅";

        resultBox.innerHTML = `

        <div class="wrong">
        Oops! 😅
        </div>

        <div class="solution">
        ${current[0]} ${correct} ${current[2]}.
        </div>

        <div class="explanation">
        Remember:
        am / is / are + verb-ing
        </div>

        `;
    }

    document.getElementById("nextButton").style.display =
        "block";
}

function nextSentence(){
    generateSentence();
}

generateSentence();

</script>

</body>
</html>
