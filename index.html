<style>

body{

<body>

<div class="app">

<div class="card">

<h1>Present Continuous</h1>

<div class="instructions">

Choose the correct Present Continuous form.

<br><br>

Example:
<br>
<b>She is reading.</b>

</div>

<div class="score-box">
Score:
<span id="score">0</span>
</div>

<div class="emoji" id="emoji">
😊
</div>

<div class="sentence" id="sentence"></div>

<div class="question">
Choose the correct answer:
</div>

<div id="buttons"></div>

<div id="resultBox"
     class="result"
     style="display:none;">
</div>

<button id="nextButton"
        class="next-btn"
        style="display:none;"
        onclick="nextSentence()">

Next sentence

</button>

</div>

</div>

<script>

const subjects = [

{subject:"I", be:"am"},
{subject:"You", be:"are"},
{subject:"We", be:"are"},
{subject:"They", be:"are"},
{subject:"He", be:"is"},
{subject:"She", be:"is"},
{subject:"Tom", be:"is"},
{subject:"Anna", be:"is"},
{subject:"My dad", be:"is"},
{subject:"The children", be:"are"},
{subject:"The dog", be:"is"}

];

const verbs = [

"play",
"eat",
"sleep",
"watch",
"read",
"cook",
"run",
"drink",
"write",
"listen",
"study",
"sing",
"dance",
"jump",
"swim",
"clean",
"draw",
"walk",
"talk",
"work"

];

const objects = [

"football",
"TV",
"a book",
"dinner",
"music",
"in the park",
"at school",
"homework",
"water",
"a sandwich",
"in the garden",
"English",
"fast",
"on the phone",
"pictures"

];

let score = 0;

const emojis = [
"😊",
"😎",
"🎉",
"⭐",
"👏",
"🥳",
"💪"
];

let currentCorrect = "";
let currentSentence = "";
let currentExplanation = "";

function randomItem(array){
    return array[Math.floor(Math.random()*array.length)];
}

function makeIng(verb){

    if(verb.endsWith("e") && verb !== "be"){
        return verb.slice(0,-1) + "ing";
    }

    return verb + "ing";
}

function shuffle(array){

    for(let i = array.length - 1; i > 0; i--){

        const j = Math.floor(Math.random() * (i + 1));

        [array[i], array[j]] = [array[j], array[i]];
    }

    return array;
}

function generateSentence(){

    const person = randomItem(subjects);

    const verb = randomItem(verbs);

    const object = randomItem(objects);

    const ingVerb = makeIng(verb);

    currentCorrect =
        `${person.be} ${ingVerb}`;

    const wrong1 =
        `${person.be} ${verb}`;

    const wrong2 =
        `${ingVerb}`;

    currentSentence =
        `${person.subject} ___ ${object}.`;

    currentExplanation =
        `${person.subject} → use ${person.be.toUpperCase()} + verb-ing.`;

    document.getElementById("sentence").innerText =
        currentSentence;

    const answers = shuffle([
        currentCorrect,
        wrong1,
        wrong2
    ]);

    let buttonsHTML = "";

    answers.forEach(answer => {

        buttonsHTML += `

            <button onclick="checkAnswer('${answer}')">
                ${answer}
            </button>

        `;
    });

    document.getElementById("buttons").innerHTML =
        buttonsHTML;

    document.getElementById("resultBox").style.display =
        "none";

    document.getElementById("nextButton").style.display =
        "none";
}

function checkAnswer(answer){

    const resultBox =
        document.getElementById("resultBox");

    resultBox.style.display = "block";

    if(answer === currentCorrect){

        score++;

        document.getElementById("score").innerText =
            score;

        document.getElementById("emoji").innerText =
            emojis[Math.floor(Math.random()*emojis.length)];

        resultBox.innerHTML = `

            <div class="correct">
                Great! 🎉
            </div>

            <div class="solution">
                ${currentSentence.replace("___", currentCorrect)}
            </div>

            <div class="explanation">
                ${currentExplanation}
            </div>

        `;

    } else {

        document.getElementById("emoji").innerText =
            "😅";

        resultBox.innerHTML = `

            <div class="wrong">
                Oops! 😅
            </div>

            <div class="solution">
                ${currentSentence.replace("___", currentCorrect)}
            </div>

            <div class="explanation">
                ${currentExplanation}
            </div>

        `;
    }

    document.getElementById("nextButton").style.display =
        "block";
}

function nextSentence(){
    generateSentence();
}

generateSentence();

</script>

</body>
</html>
