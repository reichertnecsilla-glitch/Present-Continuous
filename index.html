<body>

<div class="app">

<div class="card">

<h1>Present Continuous</h1>

<div class="instructions">

Choose the correct Present Continuous form.

        class="next-btn"

        onclick="nextSentence()">

<script>

const sentenceParts = [

{
subject:"Tom",
be:"is",
verb:"playing",
ending:"football now"
},

{
subject:"Anna",
be:"is",
verb:"reading",
ending:"a book"
},

{
subject:"The children",
be:"are",
verb:"swimming",
ending:"in the pool"
},

{
subject:"My dad",
be:"is",
verb:"cooking",
ending:"dinner"
},

{
subject:"We",
be:"are",
verb:"watching",
ending:"TV"
},

{
subject:"I",
be:"am",
verb:"doing",
ending:"my homework"
},

{
subject:"The dog",
be:"is",
verb:"sleeping",
ending:"in the garden"
},

{
subject:"They",
be:"are",
verb:"running",
ending:"in the park"
},

{
subject:"She",
be:"is",
verb:"drinking",
ending:"water"
},

{
subject:"You",
be:"are",
verb:"listening",
ending:"to music"
},

{
subject:"My friends",
be:"are",
verb:"dancing",
ending:"at the party"
},

{
subject:"The teacher",
be:"is",
verb:"writing",
ending:"on the board"
},

{
subject:"He",
be:"is",
verb:"eating",
ending:"a sandwich"
},

{
subject:"The baby",
be:"is",
verb:"crying",
ending:"now"
},

{
subject:"We",
be:"are",
verb:"studying",
ending:"English"
},

{
subject:"The girls",
be:"are",
verb:"singing",
ending:"a song"
},

{
subject:"My mother",
be:"is",
verb:"cleaning",
ending:"the kitchen"
},

{
subject:"The boys",
be:"are",
verb:"jumping",
ending:"in the garden"
},

{
subject:"I",
be:"am",
verb:"drawing",
ending:"a picture"
},

{
subject:"Tom and Ben",
be:"are",
verb:"walking",
ending:"to school"
}

];

let score = 0;

const emojis = [
"😊",
"😎",
"🎉",
"⭐",
"👏",
"🥳",
"💪"
];

let currentCorrect = "";
let currentSentence = "";
let currentExplanation = "";

function randomItem(array){
    return array[Math.floor(Math.random()*array.length)];
}

function shuffle(array){

    for(let i = array.length - 1; i > 0; i--){

        const j = Math.floor(Math.random() * (i + 1));

        [array[i], array[j]] = [array[j], array[i]];
    }

    return array;
}

function generateSentence(){

    const item = randomItem(sentenceParts);

    currentCorrect =
        `${item.be} ${item.verb}`;

    const wrong1 =
        `${item.be} ${item.verb.replace("ing","")}`;

    const wrong2 =
        `${item.verb}`;

    currentSentence =
        `${item.subject} ___ ${item.ending}.`;

    currentExplanation =
        `${item.subject} → use ${item.be.toUpperCase()} + verb-ing.`;

    document.getElementById("sentence").innerText =
        currentSentence;

    const answers = shuffle([
        currentCorrect,
        wrong1,
        wrong2
    ]);

    let buttonsHTML = "";

    answers.forEach(answer => {

        buttonsHTML += `

            <button onclick="checkAnswer('${answer}')">
                ${answer}
            </button>

        `;
    });

    document.getElementById("buttons").innerHTML =
        buttonsHTML;

    document.getElementById("resultBox").style.display =
        "none";

    document.getElementById("nextButton").style.display =
        "none";
}

function checkAnswer(answer){

    const resultBox =
        document.getElementById("resultBox");

    resultBox.style.display = "block";

    if(answer === currentCorrect){

        score++;

        document.getElementById("score").innerText =
            score;

        document.getElementById("emoji").innerText =
            emojis[Math.floor(Math.random()*emojis.length)];

        resultBox.innerHTML = `

            <div class="correct">
                Great! 🎉
            </div>

            <div class="solution">
                ${currentSentence.replace("___", currentCorrect)}
            </div>

            <div class="explanation">
                ${currentExplanation}
            </div>

        `;

    } else {

        document.getElementById("emoji").innerText =
            "😅";

        resultBox.innerHTML = `

            <div class="wrong">
                Oops! 😅
            </div>

            <div class="solution">
                ${currentSentence.replace("___", currentCorrect)}
            </div>

            <div class="explanation">
                ${currentExplanation}
            </div>

        `;
    }

    document.getElementById("nextButton").style.display =
        "block";
}

function nextSentence(){
    generateSentence();
}

generateSentence();

</script>

</body>
</html>
